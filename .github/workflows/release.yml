name: Release

on:
  push:
    tags: [ v* ]

permissions:
  contents: write
  packages: write
  
env:
  REPO: ${{github.repository}}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        GOOS: [linux, darwin, windows]
        GOARCH: [amd64, arm64]
        include:
          - GOOS: windows
            ext: .exe
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Repo Name
      id: repo-name
      run: echo name=$(basename ${{github.repository}}) >> $GITHUB_OUTPUT

    - name: Test
      run: go test -v ./...

    - name: Build
      run: make package PROGRAM=bin/${{env.GOOS}}-${{env.GOARCH}}/${{steps.repo-name.outputs.name}}${{matrix.ext}} PACKAGE=dist/${{steps.repo-name.outputs.name}}-${{env.GOOS}}-${{env.GOARCH}}.zip
      env:
        GOOS: ${{matrix.GOOS}}
        GOARCH: ${{matrix.GOARCH}}

    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-${{matrix.GOOS}}-${{matrix.GOARCH}}
        path: dist
        retention-days: 1
        if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - docker-build
    steps:
    - name: Check for release candidate
      id: rc-check
      run: |
        if [[ "${{ github.ref_name }}" =~ -rc\. ]]; then
          echo "is_rc=true" >> $GITHUB_OUTPUT
        else
          echo "is_rc=false" >> $GITHUB_OUTPUT
        fi

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: artifacts-*
        path: artifacts
        merge-multiple: true

    - name: Install ChangeLog generator
      run: |
        wget https://github.com/git-chglog/git-chglog/releases/download/v0.15.1/git-chglog_0.15.1_linux_amd64.tar.gz
        tar xzf git-chglog*.tar.gz git-chglog

    - name: "Get Last Release"
      id: last_release
      uses: InsonusK/get-latest-release@v1.1.0
      with:
        myToken: ${{ github.token }}
        exclude_types: "draft|prerelease"

    - name: Generate Changelog for ${{ github.ref_name }}
      id: generate-changelog
      run: PATH="${PATH}:." make CHANGELOG.md

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/*
        body_path: ./CHANGELOG.md
        draft: ${{ steps.rc-check.outputs.is_rc == 'true' }}
        prerelease: ${{ steps.rc-check.outputs.is_rc == 'true' }}

  docker-build:
    runs-on: ubuntu-latest
    name: Build the docker image
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Sanitize tag
        run: echo "TAG=${TAG//\//-}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Image
        run: make image IMAGE=ghcr.io/${{env.REPO}}:${{env.TAG}}

      - name: Tag latest
        run: docker tag ghcr.io/${{env.REPO}}:${{env.TAG}} ghcr.io/${{env.REPO}}:latest

      - name: Push
        run: docker push ghcr.io/${{env.REPO}}:${{env.TAG}}

      - name: Push Latest
        run: docker push ghcr.io/${{env.REPO}}:latest

      - name: Tag stable
        if: ${{ !contains(github.ref_name, '-') }}
        run: docker tag ghcr.io/${{env.REPO}}:${{env.TAG}} ghcr.io/${{env.REPO}}:stable

      - name: Push stable
        if: ${{ !contains(github.ref_name, '-') }}
        run: docker push ghcr.io/${{env.REPO}}:stable

